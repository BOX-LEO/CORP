# Sparsity sweep for OPT-125m perplexity.

model:
  source: hf_opt
  name: "125m"
  pretrained: true

task: language_modeling

dataset:
  n_calib_segments: 128
  seq_len: 2048
  batch_size: 4

cache:
  baseline_dir: cache/baselines
  stats_dir: cache/stats

pruning:
  target: both
  schedule: global
  sparsity: 0.3
  ranker: active_energy
  lambda_reg: 1.0e-3
  min_channels: 64
  min_heads: 1

collector:
  covariance_mode: exact

runner:
  device: cuda
  seed: 42
  output_dir: logs
  calib_samples: 128

experiment:
  sweep:
    pruning.sparsity: [0.2, 0.3, 0.4, 0.5]
  result_cache: cache/experiments/opt_sparsity_sweep.json
